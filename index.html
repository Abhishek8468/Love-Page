<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Kirti ❤️</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  padding: 50px;
}
.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h2 {
  color: #ff4d6d;
}
button {
  display: block;
  margin: 10px auto;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background: #e63950;
}
#response {
  margin-top: 20px;
  font-weight: bold;
  color: #333;
}
</style>
</head>

<body>

<div class="card">
  <h2>Hey Kirti ❤️</h2>

  <p>From Abhishek 💌</p>

  <p>
    Do you remember that we discussed that one day we will go to 
    <b>"Khatu Shyam Ji"</b>? ✨
  </p>

  <p>
    Would you like to live this moment?  
    I mean… can you go on a date with me at <b>Khatu Shyam</b> in June? 😊
  </p>

  <button onclick="reply('yes')">Yes, I’d love to ❤️</button>
  <button onclick="reply('maybe')">Maybe 😌</button>
  <button onclick="reply('no')">No 😢</button>

  <div id="response"></div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<br>
<button onclick="startMusic()">Tap to play music 🎵</button>

<script>
function startMusic() {
  document.getElementById("music").play();
}

function reply(answer) {
  let message = "";

  if (answer === "yes") {
    message = "You just made Abhishek the happiest ❤️";
    setTimeout(() => {
      window.location.href = "https://wa.me/"; // opens WhatsApp
    }, 2000);
  }

  if (answer === "maybe") {
    message = "Hmm… I’ll wait for your yes 😌";
  }

  if (answer === "no") {
    message = "Are you sure? 😢 I’ll still wait for you ❤️";
  }

  document.getElementById("response").innerText = message;
}
</script>

</body>
</html>
